name: 05a - Ejercicio.
on:
  push:
    branches: ["master"]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
     - name: Verificar version node
       run: node --version
     - name: instalar jsonlint
       run: sudo apt-get install jsonlint
     - name: Verificar package.json valido
       run:  jsonlint-php package.json