name: 08 - Control de flujo - funciones
on:
  push:
    branches: [ master ]
  workflow_dispatch:
jobs:
  build:
    strategy:
      matrix:
        version: [18, 20]
    runs-on: ubuntu-latest
    # continue-on-errors: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup node environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{matrix.version}}
      - run: npm ci
      - run: npm test
      - name: Forzar fallo
        run: exit 1
      - name: exitoso
        if: success()
        run: |
          echo "Confirmado: los pasos anteriores fueron exitosos"
      - name: fallo
        if: failure()
        run: |
          echo "Fallo: los pasos anteriores NO fueron exitosos"
      - name: Esto lo haces siempre
        if: always()
        run: |
          echo "Permitir: los pasos anteriores siempre seran exitosos"   
  deploy:
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: despliegue
          run: echo "Desplegando en AWS..."
          
        
    