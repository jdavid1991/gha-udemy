name: 09c - Artefactos - Multiples
on:
  push:
    branches: ["master"]
  workflow_dispatch:
jobs:
  tirada-dados:
    runs-on: ubuntu-latest
    steps:
      - name: Escribir Dado 1
        run: echo "dado1=$((1 + RANDOM % 6))" >> dado1.txt
      - name: Escribir Dado 2
        run: echo "dado2=$((1 + RANDOM % 6))" >> dado2.txt
      - name: Archivar resultado
        uses: actions/upload-artifact@v4
        with:
          name: dados
          path: |
            dado1.txt
            dado2.txt
  resumen:
    runs-on: ubuntu-latest
    needs: tirada-dados
    steps:
      - name: Descargar tirado de datos
        uses: actions/download-artifact@v4
        with:
          name: dados
      - name: Escribir resumen
        run: |
          echo "# :game_die: Resultado de los dados :game_die:" >> $GITHUB_STEP_SUMMARY
          echo "Dado 1: $(cat dado1.txt)" >> $GITHUB_STEP_SUMMARY
          echo "Dado 2: $(cat dado2.txt)" >> $GITHUB_STEP_SUMMARY
