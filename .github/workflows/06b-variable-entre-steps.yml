name: 06b-variable-entre-steps
on:
  push:
    branches: ["master"]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Número Aleatorio
        run: echo "NUM_ALEATORIO=$((1 + RANDOM % 10))" >> "$GITHUB_ENV"

      - name: Mostrar Número
        run: | 
          echo "El valor del dado es: ${{env.NUM_ALEATORIO}}"